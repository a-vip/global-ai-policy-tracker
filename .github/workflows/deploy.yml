name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - master
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Project
        run: npm run build
        
      - name: Sync files to Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          
          echo "Uploading to public_html/tools/policy-tracker..."
          lftp -c "set ftp:ssl-allow true; set ssl:verify-certificate no; set ftp:passive-mode true; open -u $FTP_USER,$FTP_PASS $FTP_HOST; mirror -R dist/ ./public_html/tools/policy-tracker/ --ignore-time --parallel=1"
          
          echo "Uploading to domains/aviperera.com/public_html/tools/policy-tracker..."
          lftp -c "set ftp:ssl-allow true; set ssl:verify-certificate no; set ftp:passive-mode true; open -u $FTP_USER,$FTP_PASS $FTP_HOST; mirror -R dist/ ./domains/aviperera.com/public_html/tools/policy-tracker/ --ignore-time --parallel=1"
          
          echo "Deployment complete!"
