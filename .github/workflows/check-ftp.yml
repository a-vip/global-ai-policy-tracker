name: Check FTP

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: npm install basic-ftp
      - name: List FTP Root
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat << 'EOF' > check.js
          const ftp = require("basic-ftp");
          async function explore() {
              const client = new ftp.Client();
              client.ftp.verbose = true;
              try {
                  await client.access({
                      host: process.env.FTP_HOST,
                      user: process.env.FTP_USER,
                      password: process.env.FTP_PASS,
                      secure: true
                  });
                  console.log("Connected. Scanning directories...");
                  async function scanDir(path, depth) {
                      if (depth > 2) return;
                      let list = [];
                      try {
                          list = await client.list(path);
                      } catch(e) { return; }
                      
                      for (let item of list) {
                          console.log(path + "/" + item.name);
                          if (item.isDirectory && item.name !== "." && item.name !== "..") {
                              await scanDir(path + "/" + item.name, depth + 1);
                          }
                          if (item.name === "wp-config.php") {
                              console.log("!!! FOUND WORDPRESS ROOT: " + path);
                          }
                      }
                  }
                  await scanDir(".", 1);
              } catch(err) {
                  console.error(err);
              }
              client.close();
          }
          explore();
          EOF
          node check.js
