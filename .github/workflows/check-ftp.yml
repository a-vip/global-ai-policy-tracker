name: Check FTP

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: npm install basic-ftp
      - name: List FTP Root
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          
          cat << 'EOF' > lftp-script.txt
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          open -u $FTP_USER,$FTP_PASS $FTP_HOST
          
          echo "==== root index.html ===="
          cat index.html
          echo "==== root index.php ===="
          cat index.php
          
          echo "==== public_html/index.html ===="
          cat public_html/index.html
          echo "==== public_html/index.php ===="
          cat public_html/index.php
          
          echo "==== domains/aviperera.com/index.html ===="
          cat domains/aviperera.com/index.html
          echo "==== domains/aviperera.com/index.php ===="
          cat domains/aviperera.com/index.php
          
          echo "==== domains/aviperera.com/public_html/index.html ===="
          cat domains/aviperera.com/public_html/index.html
          echo "==== domains/aviperera.com/public_html/index.php ===="
          cat domains/aviperera.com/public_html/index.php
          
          echo "==== DONE ===="
          quit
          EOF
          
          lftp -f lftp-script.txt
