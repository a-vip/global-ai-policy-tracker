name: Check FTP

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: npm install basic-ftp
      - name: List FTP Root
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat << 'EOF' > check.js
          const ftp = require("basic-ftp");
          const fs = require("fs");
          async function explore() {
              const client = new ftp.Client();
              try {
                  await client.access({
                      host: process.env.FTP_HOST,
                      user: process.env.FTP_USER,
                      password: process.env.FTP_PASS,
                      secure: true,
                      secureOptions: { rejectUnauthorized: false }
                  });
                  console.log("Connected.");
                  
                  const pathsToTry = [
                      "public_html/index.php",
                      "public_html/index.html",
                      "index.php",
                      "index.html",
                      "domains/aviperera.com/index.php",
                      "domains/aviperera.com/index.html",
                      "domains/aviperera.com/public_html/index.php",
                      "domains/aviperera.com/public_html/index.html"
                  ];
                  
                  for (let p of pathsToTry) {
                      try {
                          console.log("Trying to read: " + p);
                          await client.downloadTo("temp.txt", p);
                          const content = fs.readFileSync("temp.txt", "utf8");
                          if (content.includes("Live Content") || content.length > 0) {
                              console.log("==== FOUND FILE: " + p + " ====");
                              console.log(content.substring(0, 200));
                          }
                      } catch(e) {
                          // ignore
                      }
                  }
              } catch(err) {
                  console.error(err);
              }
              client.close();
          }
          explore();
          EOF
          node check.js
